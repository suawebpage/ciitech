<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifólio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="css/portifolio-carlos.css">
</head>
<body>

    <!-- Botão voltar para home -->
    <a href="index.html" class="btn-home" title="Voltar para o início">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 1L1 7L6 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="1" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        Início
    </a>

    <div class="page-layout">

        <!-- Sidebar esquerda: redes sociais -->
        <aside class="social-sidebar">
            <a href="https://wa.me/5587996640299" target="_blank" title="WhatsApp">
                <img src="images/icons/WhatsApp-logo.png" alt="WhatsApp">
            </a>
            <a href="https://www.linkedin.com/in/carlos_se_tiver" target="_blank" title="LinkedIn">
                <img src="images/icons/linkedin-logo.png" alt="LinkedIn">
            </a>
            <a href="https://www.instagram.com/carlos_dantas.ofc/" target="_blank" title="Instagram">
                <img src="images/icons/instagram-logo.png" alt="Instagram">
            </a>
            <a href="https://behance.net/carlos_dantas" target="_blank" title="Behance">
                <img src="images/icons/Behance-logo.png" alt="Behance">
            </a>
        </aside>

        <!-- Posts centralizados -->
        <main class="posts-area">
            <div class="post">
                <img src="images/colaboradores/portifolio-carlos/1.jpeg" alt="Carlos" class="portifolio-image">
                <img src="images/colaboradores/portifolio-carlos/2.jpeg" alt="Carlos" class="portifolio-image">
                <img src="images/colaboradores/portifolio-carlos/3.jpeg" alt="Carlos" class="portifolio-image">
                <img src="images/colaboradores/portifolio-carlos/4.jpeg" alt="Carlos" class="portifolio-image">
                <img src="images/colaboradores/portifolio-carlos/5.jpeg" alt="Carlos" class="portifolio-image">
                <img src="images/colaboradores/portifolio-carlos/6.jpeg" alt="Carlos" class="portifolio-image">
                <img src="images/colaboradores/portifolio-carlos/7.jpeg" alt="Carlos" class="portifolio-image">
                <img src="images/colaboradores/portifolio-carlos/8.jpeg" alt="Carlos" class="portifolio-image">
            </div>
        </main>

        <!-- Sidebar direita: marca d'água temática de design -->
        <aside class="design-sidebar" aria-hidden="true">

            <!-- Paleta de pintura com pincel -->
            <div class="deco-item deco-palette">
                <svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- corpo da paleta -->
                    <ellipse cx="45" cy="48" rx="36" ry="30" stroke="#888" stroke-width="2.5" fill="none"/>
                    <!-- buraco do polegar -->
                    <ellipse cx="30" cy="36" rx="7" ry="9" stroke="#888" stroke-width="2" fill="none"/>
                    <!-- manchas de tinta -->
                    <circle cx="52" cy="32" r="5" stroke="#888" stroke-width="1.8" fill="none"/>
                    <circle cx="65" cy="42" r="4.5" stroke="#888" stroke-width="1.8" fill="none"/>
                    <circle cx="60" cy="58" r="5" stroke="#888" stroke-width="1.8" fill="none"/>
                    <circle cx="44" cy="64" r="4" stroke="#888" stroke-width="1.8" fill="none"/>
                    <!-- cabo do pincel -->
                    <line x1="68" y1="22" x2="82" y2="8" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
                    <!-- cerdas do pincel -->
                    <ellipse cx="65" cy="25" rx="4" ry="7" transform="rotate(-45 65 25)" stroke="#888" stroke-width="1.8" fill="none"/>
                </svg>
            </div>

            <!-- Dados empilhados (3 faces visíveis isométrico) -->
            <div class="deco-item deco-dice">
                <svg width="100" height="110" viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- dado de baixo -->
                    <!-- face frente -->
                    <polygon points="15,70 50,90 50,50 15,30" stroke="#888" stroke-width="2" fill="none"/>
                    <!-- face direita -->
                    <polygon points="50,90 85,70 85,30 50,50" stroke="#888" stroke-width="2" fill="none"/>
                    <!-- face topo -->
                    <polygon points="15,30 50,10 85,30 50,50" stroke="#888" stroke-width="2" fill="none"/>
                    <!-- pontos face frente -->
                    <circle cx="28" cy="52" r="2.5" fill="#888"/>
                    <circle cx="28" cy="68" r="2.5" fill="#888"/>
                    <circle cx="36" cy="60" r="2.5" fill="#888"/>
                    <!-- pontos face direita -->
                    <circle cx="65" cy="45" r="2.5" fill="#888"/>
                    <circle cx="72" cy="60" r="2.5" fill="#888"/>
                    <circle cx="65" cy="67" r="2.5" fill="#888"/>
                    <!-- pontos face topo -->
                    <circle cx="38" cy="32" r="2.5" fill="#888"/>
                    <circle cx="50" cy="26" r="2.5" fill="#888"/>
                    <circle cx="62" cy="32" r="2.5" fill="#888"/>
                    <!-- dado de cima (menor, deslocado) -->
                    <polygon points="35,30 58,18 58,-4 35,8"  stroke="#888" stroke-width="1.5" fill="none"/>
                    <polygon points="58,18 81,30 81,8 58,-4" stroke="#888" stroke-width="1.5" fill="none"/>
                    <polygon points="35,8 58,-4 81,8 58,20"   stroke="#888" stroke-width="1.5" fill="none"/>
                </svg>
            </div>

            <!-- Esquadro / Régua de arquiteto -->
            <div class="deco-item deco-ruler">
                <svg width="85" height="85" viewBox="0 0 85 85" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- esquadro 90° -->
                    <polyline points="10,10 10,75 75,75" stroke="#888" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <!-- marcações de régua horizontal -->
                    <line x1="20" y1="75" x2="20" y2="67" stroke="#888" stroke-width="1.5"/>
                    <line x1="30" y1="75" x2="30" y2="70" stroke="#888" stroke-width="1.2"/>
                    <line x1="40" y1="75" x2="40" y2="67" stroke="#888" stroke-width="1.5"/>
                    <line x1="50" y1="75" x2="50" y2="70" stroke="#888" stroke-width="1.2"/>
                    <line x1="60" y1="75" x2="60" y2="67" stroke="#888" stroke-width="1.5"/>
                    <!-- marcações de régua vertical -->
                    <line x1="10" y1="20" x2="18" y2="20" stroke="#888" stroke-width="1.5"/>
                    <line x1="10" y1="30" x2="15" y2="30" stroke="#888" stroke-width="1.2"/>
                    <line x1="10" y1="40" x2="18" y2="40" stroke="#888" stroke-width="1.5"/>
                    <line x1="10" y1="50" x2="15" y2="50" stroke="#888" stroke-width="1.2"/>
                    <line x1="10" y1="60" x2="18" y2="60" stroke="#888" stroke-width="1.5"/>
                    <!-- triângulo interno indicativo -->
                    <polyline points="10,55 10,75 30,75" stroke="#888" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
                </svg>
            </div>

            <!-- Pincel longo com pingo -->
            <div class="deco-item deco-brush">
                <svg width="30" height="120" viewBox="0 0 30 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- cabo -->
                    <rect x="12" y="0" width="6" height="78" rx="3" stroke="#888" stroke-width="1.8" fill="none"/>
                    <!-- anel metálico -->
                    <rect x="10" y="74" width="10" height="6" rx="1" stroke="#888" stroke-width="1.5" fill="none"/>
                    <!-- cerdas -->
                    <ellipse cx="15" cy="91" rx="6" ry="11" stroke="#888" stroke-width="1.8" fill="none"/>
                    <!-- ponta afilada -->
                    <line x1="15" y1="102" x2="15" y2="108" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
                    <!-- pingo de tinta -->
                    <ellipse cx="15" cy="114" rx="3" ry="4" stroke="#888" stroke-width="1.5" fill="none"/>
                    <line x1="15" y1="108" x2="15" y2="110" stroke="#888" stroke-width="1.2"/>
                </svg>
            </div>

            <!-- Compasso geométrico -->
            <div class="deco-item deco-compass">
                <svg width="80" height="95" viewBox="0 0 80 95" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- perna esquerda -->
                    <line x1="40" y1="10" x2="15" y2="82" stroke="#888" stroke-width="2.2" stroke-linecap="round"/>
                    <!-- perna direita -->
                    <line x1="40" y1="10" x2="65" y2="82" stroke="#888" stroke-width="2.2" stroke-linecap="round"/>
                    <!-- articulação central -->
                    <circle cx="40" cy="10" r="5" stroke="#888" stroke-width="2" fill="none"/>
                    <!-- ponta esquerda -->
                    <line x1="15" y1="82" x2="12" y2="90" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
                    <!-- ponta direita (lápis) -->
                    <polygon points="62,82 68,82 65,92" stroke="#888" stroke-width="1.5" fill="none"/>
                    <!-- arco de medida -->
                    <path d="M20,55 A28,28 0 0,0 60,55" stroke="#888" stroke-width="1.4" stroke-dasharray="4 3" fill="none"/>
                    <!-- parafuso intermediário (pino de tensão) -->
                    <line x1="28" y1="45" x2="52" y2="45" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="40" cy="45" r="3" stroke="#888" stroke-width="1.5" fill="none"/>
                </svg>
            </div>

        </aside>

    </div>

</body>
</html>
